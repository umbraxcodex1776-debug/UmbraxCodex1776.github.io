<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMBRAX | SYSTEM 1776</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41; /* Verde Matrix/Terminal */
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 1px solid #00ff41;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            position: relative;
        }
        img {
            max-width: 250px;
            filter: grayscale(100%) brightness(1.2);
            border: 1px solid #00ff41;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .status {
            margin-top: 20px;
            font-size: 0.9em;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scanline"></div>
        <img src="nivel0.png" alt="DATA_ENCRYPTED">
    </div>
    <div class="status">
        [ ESTADO: ESPERANDO FRECUENCIA MORSE ]<br>
        [ NIVEL 0: ACTIVO ]
    </div>
</body>
</html>
